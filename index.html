<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数独游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2rem;
        }

        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .sudoku-board {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            gap: 1px;
            background: #333;
            border: 3px solid #333;
            margin-bottom: 20px;
            border-radius: 8px;
            overflow: hidden;
        }

        .cell {
            aspect-ratio: 1;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }

        .cell:hover {
            background: #e8f4f8;
        }

        .cell.selected {
            background: #b3d9ff;
        }

        .cell.highlighted {
            background: #fff3cd;
        }

        .cell.fixed {
            background: #f0f0f0;
            color: #333;
            font-weight: 700;
        }

        .cell.error {
            background: #ffcdd2;
            color: #c62828;
        }

        .cell.success {
            background: #c8e6c9;
            color: #2e7d32;
        }

        /* 3x3 区块边框 */
        .cell:nth-child(3n) {
            border-right: 2px solid #333;
        }

        .cell:nth-child(9n) {
            border-right: none;
        }

        .cell:nth-child(n+19):nth-child(-n+27),
        .cell:nth-child(n+46):nth-child(-n+54) {
            border-bottom: 2px solid #333;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
            min-width: 80px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .number-pad {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }

        .num-btn {
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background: white;
            font-size: 1.3rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .num-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
            transform: scale(1.05);
        }

        .num-btn.clear {
            grid-column: span 2;
            background: #ff6b6b;
            color: white;
            border-color: #ff6b6b;
        }

        .num-btn.clear:hover {
            background: #ee5a5a;
        }

        .status {
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            font-weight: 600;
            margin-top: 15px;
        }

        .status.hidden {
            display: none;
        }

        .status.success {
            background: #c8e6c9;
            color: #2e7d32;
        }

        .status.error {
            background: #ffcdd2;
            color: #c62828;
        }

        .difficulty {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 15px;
        }

        .diff-btn {
            padding: 8px 16px;
            border: 2px solid #667eea;
            border-radius: 20px;
            background: white;
            color: #667eea;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .diff-btn.active {
            background: #667eea;
            color: white;
        }

        .diff-btn:hover {
            transform: scale(1.05);
        }

        .timer {
            text-align: center;
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 15px;
            font-weight: 600;
        }

        @media (max-width: 480px) {
            .cell {
                font-size: 1.2rem;
            }
            
            .num-btn {
                padding: 12px;
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🎯 数独</h1>
        <p class="subtitle">填满 9×9 格子，每行、每列、每宫都包含 1-9</p>
        
        <div class="difficulty">
            <button class="diff-btn active" onclick="setDifficulty('easy')">简单</button>
            <button class="diff-btn" onclick="setDifficulty('medium')">中等</button>
            <button class="diff-btn" onclick="setDifficulty('hard')">困难</button>
        </div>

        <div class="timer">⏱️ <span id="timer">00:00</span></div>

        <div class="sudoku-board" id="board"></div>

        <div class="number-pad">
            <button class="num-btn" onclick="inputNumber(1)">1</button>
            <button class="num-btn" onclick="inputNumber(2)">2</button>
            <button class="num-btn" onclick="inputNumber(3)">3</button>
            <button class="num-btn" onclick="inputNumber(4)">4</button>
            <button class="num-btn" onclick="inputNumber(5)">5</button>
            <button class="num-btn" onclick="inputNumber(6)">6</button>
            <button class="num-btn" onclick="inputNumber(7)">7</button>
            <button class="num-btn" onclick="inputNumber(8)">8</button>
            <button class="num-btn" onclick="inputNumber(9)">9</button>
            <button class="num-btn clear" onclick="clearCell()">清除</button>
        </div>

        <div class="controls">
            <button class="btn btn-primary" onclick="newGame()">新游戏</button>
            <button class="btn btn-secondary" onclick="getHint()">提示</button>
            <button class="btn btn-secondary" onclick="checkSolution()">检查</button>
            <button class="btn btn-secondary" onclick="solvePuzzle()">解答</button>
        </div>

        <div class="status hidden" id="status"></div>
    </div>

    <script>
        let board = [];
        let solution = [];
        let fixedCells = [];
        let selectedCell = null;
        let difficulty = 'easy';
        let timerInterval = null;
        let seconds = 0;

        // 初始化游戏
        function init() {
            newGame();
        }

        // 生成完整数独解
        function generateSolution() {
            const grid = Array(9).fill().map(() => Array(9).fill(0));
            
            function isValid(grid, row, col, num) {
                for (let x = 0; x < 9; x++) {
                    if (grid[row][x] === num) return false;
                }
                for (let x = 0; x < 9; x++) {
                    if (grid[x][col] === num) return false;
                }
                const startRow = row - row % 3;
                const startCol = col - col % 3;
                for (let i = 0; i < 3; i++) {
                    for (let j = 0; j < 3; j++) {
                        if (grid[i + startRow][j + startCol] === num) return false;
                    }
                }
                return true;
            }

            function solve(grid) {
                for (let i = 0; i < 9; i++) {
                    for (let j = 0; j < 9; j++) {
                        if (grid[i][j] === 0) {
                            const nums = [1, 2, 3, 4, 5, 6, 7, 8, 9].sort(() => Math.random() - 0.5);
                            for (let num of nums) {
                                if (isValid(grid, i, j, num)) {
                                    grid[i][j] = num;
                                    if (solve(grid)) return true;
                                    grid[i][j] = 0;
                                }
                            }
                            return false;
                        }
                    }
                }
                return true;
            }

            solve(grid);
            return grid;
        }

        // 根据难度挖空
        function createPuzzle(solution, diff) {
            const puzzle = solution.map(row => [...row]);
            const cells = [];
            for (let i = 0; i < 9; i++) {
                for (let j = 0; j < 9; j++) {
                    cells.push([i, j]);
                }
            }
            cells.sort(() => Math.random() - 0.5);

            let removeCount;
            switch (diff) {
                case 'easy': removeCount = 35; break;
                case 'medium': removeCount = 45; break;
                case 'hard': removeCount = 55; break;
                default: removeCount = 35;
            }

            for (let i = 0; i < removeCount; i++) {
                const [row, col] = cells[i];
                puzzle[row][col] = 0;
            }

            return puzzle;
        }

        // 开始新游戏
        function newGame() {
            clearInterval(timerInterval);
            seconds = 0;
            updateTimer();
            timerInterval = setInterval(updateTimer, 1000);

            solution = generateSolution();
            board = createPuzzle(solution, difficulty);
            fixedCells = [];
            
            for (let i = 0; i < 9; i++) {
                for (let j = 0; j < 9; j++) {
                    if (board[i][j] !== 0) {
                        fixedCells.push(`${i}-${j}`);
                    }
                }
            }

            renderBoard();
            hideStatus();
        }

        // 渲染游戏板
        function renderBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';

            for (let i = 0; i < 9; i++) {
                for (let j = 0; j < 9; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = i;
                    cell.dataset.col = j;
                    
                    if (board[i][j] !== 0) {
                        cell.textContent = board[i][j];
                    }
                    
                    if (fixedCells.includes(`${i}-${j}`)) {
                        cell.classList.add('fixed');
                    }
                    
                    cell.onclick = () => selectCell(i, j);
                    boardEl.appendChild(cell);
                }
            }
        }

        // 选择单元格
        function selectCell(row, col) {
            selectedCell = { row, col };
            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => {
                cell.classList.remove('selected', 'highlighted');
                const r = parseInt(cell.dataset.row);
                const c = parseInt(cell.dataset.col);
                
                if (r === row && c === col) {
                    cell.classList.add('selected');
                } else if (r === row || c === col || 
                          (Math.floor(r/3) === Math.floor(row/3) && Math.floor(c/3) === Math.floor(col/3))) {
                    cell.classList.add('highlighted');
                }
            });
        }

        // 输入数字
        function inputNumber(num) {
            if (!selectedCell) {
                showStatus('请先选择一个格子', 'error');
                return;
            }
            
            const { row, col } = selectedCell;
            if (fixedCells.includes(`${row}-${col}`)) {
                showStatus('不能修改初始数字', 'error');
                return;
            }

            board[row][col] = num;
            renderBoard();
            selectCell(row, col);
            
            // 检查是否完成
            if (isBoardFull()) {
                checkSolution();
            }
        }

        // 清除格子
        function clearCell() {
            if (!selectedCell) {
                showStatus('请先选择一个格子', 'error');
                return;
            }
            
            const { row, col } = selectedCell;
            if (fixedCells.includes(`${row}-${col}`)) {
                showStatus('不能清除初始数字', 'error');
                return;
            }

            board[row][col] = 0;
            renderBoard();
            selectCell(row, col);
        }

        // 检查棋盘是否填满
        function isBoardFull() {
            for (let i = 0; i < 9; i++) {
                for (let j = 0; j < 9; j++) {
                    if (board[i][j] === 0) return false;
                }
            }
            return true;
        }

        // 检查解答
        function checkSolution() {
            let correct = true;
            const cells = document.querySelectorAll('.cell');
            
            cells.forEach(cell => {
                cell.classList.remove('error', 'success');
                const r = parseInt(cell.dataset.row);
                const c = parseInt(cell.dataset.col);
                
                if (board[r][c] !== 0) {
                    if (board[r][c] === solution[r][c]) {
                        cell.classList.add('success');
                    } else {
                        cell.classList.add('error');
                        correct = false;
                    }
                } else {
                    correct = false;
                }
            });

            if (correct && isBoardFull()) {
                clearInterval(timerInterval);
                showStatus(`🎉 恭喜！你完成了数独！用时：${document.getElementById('timer').textContent}`, 'success');
            } else if (!correct) {
                showStatus('❌ 有错误，红色格子需要修改', 'error');
            } else {
                showStatus('⏳ 还有空格子未填', 'error');
            }
        }

        // 获取提示
        function getHint() {
            const emptyCells = [];
            for (let i = 0; i < 9; i++) {
                for (let j = 0; j < 9; j++) {
                    if (board[i][j] === 0 || board[i][j] !== solution[i][j]) {
                        emptyCells.push([i, j]);
                    }
                }
            }

            if (emptyCells.length === 0) {
                showStatus('已经完成啦！', 'success');
                return;
            }

            const [row, col] = emptyCells[Math.floor(Math.random() * emptyCells.length)];
            board[row][col] = solution[row][col];
            renderBoard();
            selectCell(row, col);
            showStatus(`💡 提示：[${row + 1}, ${col + 1}] 是 ${solution[row][col]}`, 'success');
        }

        // 显示完整解答
        function solvePuzzle() {
            if (!confirm('确定要查看完整解答吗？')) return;
            
            board = solution.map(row => [...row]);
            renderBoard();
            clearInterval(timerInterval);
            showStatus('📖 这是完整解答', 'success');
        }

        // 设置难度
        function setDifficulty(diff) {
            difficulty = diff;
            document.querySelectorAll('.diff-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            newGame();
        }

        // 更新计时器
        function updateTimer() {
            const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
            const secs = (seconds % 60).toString().padStart(2, '0');
            document.getElementById('timer').textContent = `${mins}:${secs}`;
            seconds++;
        }

        // 显示状态信息
        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = `status ${type}`;
        }

        // 隐藏状态信息
        function hideStatus() {
            document.getElementById('status').className = 'status hidden';
        }

        // 键盘支持
        document.addEventListener('keydown', (e) => {
            if (e.key >= '1' && e.key <= '9') {
                inputNumber(parseInt(e.key));
            } else if (e.key === 'Backspace' || e.key === 'Delete') {
                clearCell();
            } else if (e.key === 'ArrowUp' && selectedCell && selectedCell.row > 0) {
                selectCell(selectedCell.row - 1, selectedCell.col);
            } else if (e.key === 'ArrowDown' && selectedCell && selectedCell.row < 8) {
                selectCell(selectedCell.row + 1, selectedCell.col);
            } else if (e.key === 'ArrowLeft' && selectedCell && selectedCell.col > 0) {
                selectCell(selectedCell.row, selectedCell.col - 1);
            } else if (e.key === 'ArrowRight' && selectedCell && selectedCell.col < 8) {
                selectCell(selectedCell.row, selectedCell.col + 1);
            }
        });

        // 启动游戏
        init();
    </script>
</body>
</html>
